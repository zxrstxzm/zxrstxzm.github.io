<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zzuxbox</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Zhi+Mang+Xing&display=swap');

        :root {
            --bg: #f6f6f4;
            --paper: rgba(255, 255, 255, 0.88);
            --line: rgba(0, 0, 0, 0.1);
            --line-strong: rgba(0, 0, 0, 0.18);
            --text: #111111;
            --text-soft: rgba(17, 17, 17, 0.62);
            --shadow: 0 22px 70px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            font-family: "Manrope", sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            color: var(--text);
            background:
                radial-gradient(circle at 18% 20%, rgba(255, 255, 255, 0.96), transparent 24%),
                radial-gradient(circle at 82% 16%, rgba(0, 0, 0, 0.035), transparent 18%),
                radial-gradient(circle at 15% 84%, rgba(0, 0, 0, 0.04), transparent 22%),
                linear-gradient(180deg, #fbfbfa 0%, #f1f1ee 100%);
        }

        #danmakuBox {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }

        .dm-item {
            position: absolute;
            white-space: nowrap;
            font-family: "Zhi Mang Xing", "HanziPen SC", "Segoe Print", cursive;
            font-size: clamp(1.8rem, 4.6vw, 4.2rem);
            line-height: 1;
            color: rgba(0, 0, 0, 0.12);
            text-shadow: 0 0 0.5px rgba(0, 0, 0, 0.08);
            transform-origin: center;
            animation: move-left linear forwards;
            will-change: transform, left;
        }

        .dm-item.is-clue {
            color: rgba(0, 0, 0, 0.2);
            text-shadow: 0 0 0.6px rgba(0, 0, 0, 0.12), 0 0 18px rgba(0, 0, 0, 0.04);
        }

        .dm-item.is-clue::before {
            content: "✦";
            display: inline-block;
            margin-right: 0.32em;
            font-size: 0.72em;
            opacity: 0.9;
        }

        .user-danmaku {
            color: rgba(0, 0, 0, 0.46) !important;
            font-size: clamp(1.4rem, 3.3vw, 2.8rem) !important;
        }

        @keyframes move-left {
            from { left: 100%; }
            to { left: -240%; }
        }

        .page {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem 1rem 8rem;
        }

        .stage {
            position: relative;
            width: min(92vw, 320px);
            min-height: 388px;
            display: grid;
            place-items: center;
        }

        .entry-card,
        .login-panel {
            position: absolute;
            inset: 0;
            border: 1px solid var(--line);
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.76);
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow);
        }

        .entry-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.35rem;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
        }

        .entry-card:hover {
            transform: translateY(-2px);
            border-color: var(--line-strong);
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.1);
        }

        .entry-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .mark {
            width: 82px;
            height: 82px;
            margin: 0 auto;
            border-radius: 24px;
            padding: 0.35rem;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.08);
        }

        .mark img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .entry-tag {
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-soft);
        }

        .entry-main {
            display: grid;
            gap: 0.75rem;
            text-align: center;
        }

        .entry-main p {
            font-size: 0.88rem;
            line-height: 1.9;
            color: var(--text-soft);
        }

        .entry-foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--line);
            color: var(--text-soft);
            font-size: 0.82rem;
        }

        .tap-dot {
            position: relative;
            width: 11px;
            height: 11px;
            border-radius: 999px;
            background: #0f0f0f;
            box-shadow: 0 0 0 8px rgba(0, 0, 0, 0.04);
        }

        .tap-dot::before,
        .tap-dot::after {
            content: "";
            position: absolute;
            inset: 50% auto auto 50%;
            width: 100%;
            height: 100%;
            border-radius: 999px;
            border: 1px solid rgba(0, 0, 0, 0.18);
            transform: translate(-50%, -50%) scale(1);
            animation: cornerPulse 2.8s ease-out infinite;
        }

        .tap-dot::after {
            animation-delay: 1.2s;
        }

        @keyframes cornerPulse {
            0% {
                opacity: 0.55;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(4.8);
            }
        }

        .entry-card.is-hidden {
            opacity: 0;
            filter: blur(10px);
            transform: scale(0.96);
            pointer-events: none;
            transition: opacity 0.55s ease, transform 0.55s ease, filter 0.55s ease;
        }

        .login-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.9rem;
            opacity: 0;
            pointer-events: none;
            filter: blur(18px);
            transform: scale(0.94);
            transition: opacity 0.55s ease, transform 0.55s ease, filter 0.55s ease;
        }

        .stage.is-open .login-panel {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
            filter: blur(0);
        }

        .login-shell {
            width: 100%;
            max-width: 248px;
            display: grid;
            gap: 0.74rem;
            position: relative;
        }

        .login-head {
            min-height: 0.4rem;
        }

        .puzzle-note {
            font-size: 0.72rem;
            line-height: 1.75;
            color: rgba(17, 17, 17, 0.54);
            text-align: center;
            margin-top: 0.1rem;
        }

        .puzzle-note.is-error {
            color: rgba(120, 23, 23, 0.74);
        }

        .puzzle-note.is-success {
            color: rgba(18, 92, 52, 0.76);
        }

        .admin-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 0.15rem;
        }

        .admin-toggle {
            border: none;
            background: transparent;
            color: rgba(17, 17, 17, 0.46);
            font-size: 0.72rem;
            cursor: pointer;
            padding: 0;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .admin-toggle:hover {
            color: rgba(17, 17, 17, 0.72);
        }

        .admin-panel {
            display: grid;
            gap: 0.62rem;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transform: translateY(-4px);
            transition: max-height 0.3s ease, opacity 0.25s ease, transform 0.25s ease, margin-top 0.25s ease;
            margin-top: 0;
        }

        .admin-panel.is-open {
            max-height: 140px;
            opacity: 1;
            transform: translateY(0);
            margin-top: 0.15rem;
        }

        .admin-panel .field input {
            letter-spacing: 0.04em;
        }

        .form {
            display: grid;
            gap: 0.62rem;
        }

        .field {
            display: grid;
            gap: 0.38rem;
        }

        .field label {
            font-size: 0.78rem;
            font-weight: 700;
            color: rgba(17, 17, 17, 0.76);
        }

        .field input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.84);
            color: var(--text);
            padding: 0.75rem 0.88rem;
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        .field input:focus {
            border-color: rgba(0, 0, 0, 0.22);
            transform: translateY(-1px);
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.04);
        }

        .form-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            font-size: 0.78rem;
            color: var(--text-soft);
        }

        .remember {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
        }

        .remember input {
            width: 0.95rem;
            height: 0.95rem;
            accent-color: #111111;
        }

        .ghost-link {
            color: #111111;
            text-decoration: none;
        }

        .ghost-link:hover {
            text-decoration: underline;
        }

        .actions {
            display: grid;
            gap: 0.55rem;
            margin-top: 0.35rem;
        }

        .btn {
            width: 100%;
            border: 1px solid #111111;
            border-radius: 999px;
            padding: 0.8rem 0.95rem;
            font-size: 0.84rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: #111111;
            color: #ffffff;
        }

        .btn-secondary {
            background: transparent;
            color: #111111;
        }

        .panel-close {
            position: absolute;
            top: -0.15rem;
            right: -0.1rem;
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: rgba(17, 17, 17, 0.36);
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: color 0.2s ease, background 0.2s ease, transform 0.2s ease;
        }

        .panel-close:hover {
            color: rgba(17, 17, 17, 0.72);
            background: rgba(0, 0, 0, 0.04);
            transform: scale(1.05);
        }

        .panel-close::before,
        .panel-close::after {
            content: "";
            position: absolute;
            width: 11px;
            height: 1px;
            background: currentColor;
            border-radius: 999px;
        }

        .panel-close::before {
            transform: rotate(45deg);
        }

        .panel-close::after {
            transform: rotate(-45deg);
        }

        .key-corner {
            position: absolute;
            right: -0.16rem;
            bottom: -0.3rem;
            width: 46px;
            height: 46px;
            border: none;
            border-radius: 18px 0 22px 0;
            background: transparent;
            cursor: pointer;
        }

        .key-hint {
            position: absolute;
            right: 0.16rem;
            bottom: 0.02rem;
            width: 26px;
            height: 26px;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: rgba(17, 17, 17, 0.08);
            transition: color 0.24s ease, background 0.24s ease, transform 0.24s ease, opacity 0.24s ease;
            opacity: 0;
            pointer-events: none;
        }

        .key-corner:hover .key-hint {
            color: rgba(17, 17, 17, 0.2);
        }

        .key-corner.is-revealed .key-hint {
            opacity: 1;
        }

        .key-corner.is-revealed .key-hint {
            color: rgba(17, 17, 17, 0.62);
            background: rgba(0, 0, 0, 0.04);
            transform: translateY(-1px) scale(1.02);
        }

        .key-hint::before,
        .key-hint::after {
            content: "";
            position: absolute;
        }

        .key-hint::before {
            width: 8px;
            height: 8px;
            border: 1.4px solid currentColor;
            border-radius: 50%;
            left: 6px;
            top: 8px;
        }

        .key-hint::after {
            width: 9px;
            height: 1.4px;
            background: currentColor;
            left: 12px;
            top: 12px;
            box-shadow: 4px 0 0 currentColor, 6px 3px 0 currentColor;
            transform: rotate(-8deg);
            transform-origin: left center;
        }

        .reveal-ripple {
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.012) 0%, rgba(255,255,255,0.008) 35%, rgba(255,255,255,0) 72%);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06), inset 0 0 10px rgba(255, 255, 255, 0.04);
            transform: translate(-50%, -50%) scale(0.15);
            pointer-events: none;
            z-index: 40;
            opacity: 0;
            backdrop-filter: blur(3px) saturate(0.92);
            mix-blend-mode: multiply;
        }

        .reveal-ripple.is-run {
            animation: reveal 1.7s cubic-bezier(0.22, 0.68, 0.2, 1) forwards;
        }

        @keyframes reveal {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.15);
            }
            16% {
                opacity: 0.22;
            }
            52% {
                opacity: 0.14;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(36);
            }
        }

        .footer-ui {
            position: fixed;
            left: 50%;
            bottom: 4.5rem;
            transform: translateX(-50%);
            width: min(88vw, 420px);
            display: flex;
            gap: 0.6rem;
            z-index: 20;
        }

        .music-player {
            position: fixed;
            right: 1.2rem;
            bottom: 1.2rem;
            z-index: 21;
        }

        .music-player::after {
            content: attr(data-track);
            position: absolute;
            right: calc(100% + 0.6rem);
            top: 50%;
            transform: translateY(-50%);
            max-width: 180px;
            padding: 0.38rem 0.62rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--line);
            backdrop-filter: blur(10px);
            color: rgba(17, 17, 17, 0.58);
            font-size: 0.68rem;
            letter-spacing: 0.04em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .music-player:hover::after,
        .music-player.is-playing::after {
            opacity: 1;
            transform: translateY(-50%) translateX(-2px);
        }

        .music-toggle {
            width: 46px;
            height: 46px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(10px);
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.07);
            color: #111111;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .music-toggle::marker {
            content: "";
        }

        .music-toggle span {
            position: absolute;
            inset: 0;
            border-radius: 999px;
            pointer-events: none;
        }

        .music-toggle .ring,
        .music-toggle .ring::before,
        .music-toggle .ring::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
        }

        .music-toggle .ring {
            border: 1px solid rgba(17, 17, 17, 0.08);
            opacity: 0;
            transform: scale(0.88);
        }

        .music-player.is-playing .music-toggle .ring {
            animation: musicPulse 2.6s ease-out infinite;
        }

        .music-player.is-playing .music-toggle .ring::before {
            inset: -5px;
            border: 1px solid rgba(17, 17, 17, 0.06);
            animation: musicPulse 2.6s ease-out infinite 0.45s;
        }

        .music-player.is-playing .music-toggle .ring::after {
            inset: -10px;
            border: 1px solid rgba(17, 17, 17, 0.04);
            animation: musicPulse 2.6s ease-out infinite 0.9s;
        }

        .music-toggle:hover {
            transform: translateY(-1px);
            border-color: var(--line-strong);
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.09);
        }

        .music-toggle::before,
        .music-toggle::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: opacity 0.18s ease, transform 0.18s ease;
        }

        .music-toggle::before {
            width: 0;
            height: 0;
            margin-left: 1px;
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-left: 11px solid currentColor;
        }

        .music-toggle::after {
            width: 12px;
            height: 14px;
            background: linear-gradient(90deg, currentColor 0 34%, transparent 34% 66%, currentColor 66% 100%);
            opacity: 0;
        }

        .music-player.is-playing .music-toggle::before {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.9);
        }

        .music-player.is-playing .music-toggle::after {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .music-player.is-playing .music-toggle {
            background: rgba(17, 17, 17, 0.92);
            color: #ffffff;
            animation: musicFloat 3.2s ease-in-out infinite;
        }

        @keyframes musicPulse {
            0% {
                opacity: 0;
                transform: scale(0.88);
            }
            18% {
                opacity: 0.42;
            }
            100% {
                opacity: 0;
                transform: scale(1.42);
            }
        }

        @keyframes musicFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-2px);
            }
        }

        .footer-ui input {
            flex: 1;
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.74);
            padding: 0.9rem 1rem;
            font-size: 0.9rem;
            color: var(--text);
            outline: none;
            backdrop-filter: blur(8px);
        }

        .footer-ui button {
            border: 1px solid #111111;
            border-radius: 999px;
            background: #111111;
            color: #ffffff;
            padding: 0.9rem 1.15rem;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
        }

        .rip {
            position: fixed;
            border: 1px solid rgba(0, 0, 0, 0.24);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: out 0.55s ease-out forwards;
            z-index: 999;
        }

        @keyframes out {
            0% { width: 0; height: 0; opacity: 0.9; }
            100% { width: 140px; height: 140px; opacity: 0; }
        }

        @media (max-width: 640px) {
            body {
                overflow-x: hidden;
                overflow-y: auto;
            }

            .page {
                min-height: auto;
                padding: 1rem 1rem 7rem;
                place-items: start center;
            }

            .stage {
                width: min(94vw, 308px);
                min-height: 370px;
                margin-top: 1.2rem;
            }

            .entry-card,
            .login-panel {
                border-radius: 24px;
            }

            .entry-card {
                padding: 1.25rem;
            }

            .login-shell {
                max-width: 100%;
            }

            .form-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .footer-ui {
                width: min(92vw, 390px);
                bottom: 5.6rem;
            }

            .music-player {
                right: 1rem;
                bottom: 1rem;
            }

            .music-player::after {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="danmakuBox"></div>

    <div class="page">
        <main class="stage" id="stage">
            <section class="entry-card" id="entryCard">
                <div class="entry-top">
                    <div class="mark">
                        <img src="https://cdn.pixelpunk.cc/f/4b2b31a898f14a36/mmexport1775619313684.gif" alt="logo">
                    </div>
                    <div class="entry-tag">zzuxbox / private entry</div>
                </div>

                <div class="entry-main">
                    <p>夜色把城市放慢以后，连一盏没说出口的灯，也像在替人温柔地等。</p>
                </div>

                <div class="entry-foot">
                    <span>tap the card</span>
                    <span class="tap-dot"></span>
                </div>
            </section>

            <section class="login-panel" id="loginPanel">
                <div class="login-shell">
                    <button class="panel-close" type="button" id="backBtn" aria-label="返回卡片"></button>

                    <div class="login-head">
                    </div>

                    <form class="form" onsubmit="mockLogin(event)">
                        <div class="field">
                            <label for="password">邀请码</label>
                            <input id="password" type="text" placeholder="去弹幕里找那条带标记的低声句子" autocomplete="off">
                        </div>

                        <div class="form-row">
                            <span>偶尔路过的 ✦ 标记里，藏着一串字母</span>
                            <a class="ghost-link" href="javascript:void(0)" id="hintBtn">查看提示</a>
                        </div>

                        <div class="actions">
                            <button class="btn btn-primary" type="submit">解锁入口</button>
                        </div>
                    </form>

                    <div class="admin-row">
                        <button class="admin-toggle" type="button" id="adminToggle">Admin</button>
                    </div>

                    <div class="admin-panel" id="adminPanel">
                        <div class="field">
                            <label for="adminPassword">管理员口令</label>
                            <input id="adminPassword" type="password" placeholder="站主专用" autocomplete="off">
                        </div>
                        <button class="btn btn-secondary" type="button" id="adminLoginBtn">管理员进入</button>
                    </div>

                    <div class="puzzle-note" id="puzzleNote">这不是门禁，只是一场藏在弹幕缝隙里的小解谜。</div>
                    <button class="key-corner" type="button" id="fillInviteBtn" aria-label="隐藏钥匙入口">
                        <span class="key-hint" aria-hidden="true"></span>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <div class="footer-ui">
        <input type="text" id="ipt" placeholder="输入你想说的话..." maxlength="20">
        <button onclick="send()">发送</button>
    </div>

    <div class="music-player" id="musicPlayer" data-track="Trap Sad">
        <button class="music-toggle" id="musicToggle" type="button" aria-label="播放或暂停音乐"><span class="ring"></span></button>
        <audio id="bgm" preload="metadata"></audio>
    </div>

    <script>
        const box = document.getElementById('danmakuBox');
        const ipt = document.getElementById('ipt');
        const stage = document.getElementById('stage');
        const entryCard = document.getElementById('entryCard');
        const backBtn = document.getElementById('backBtn');
        const passwordInput = document.getElementById('password');
        const hintBtn = document.getElementById('hintBtn');
        const fillInviteBtn = document.getElementById('fillInviteBtn');
        const adminToggle = document.getElementById('adminToggle');
        const adminPanel = document.getElementById('adminPanel');
        const adminPasswordInput = document.getElementById('adminPassword');
        const adminLoginBtn = document.getElementById('adminLoginBtn');
        const puzzleNote = document.getElementById('puzzleNote');
        const musicPlayer = document.getElementById('musicPlayer');
        const musicToggle = document.getElementById('musicToggle');
        const bgm = document.getElementById('bgm');
        const storageKey = 'zzuxbox-bgm-state';
        const inviteCode = 'VELVET-17';
        const adminCode = 'ZXRSTXZN';
        const playlist = [
            { title: 'Trap Sad', src: 'assets/mixkit-trap-sad-266.mp3' },
            { title: 'Classical Vibes', src: 'assets/mixkit-classical-vibes-5-688.mp3' },
            { title: 'RNB 2', src: 'assets/mixkit-rnb-2-226.mp3' },
            { title: 'Serene View', src: 'assets/mixkit-serene-view-443.mp3' }
        ];
        const clueSeeds = [
            `把夜色轻轻念成 ${inviteCode}`,
            `有一串字母落在风里：${inviteCode}`,
            `今晚真正的暗号只是 ${inviteCode}`
        ];
        let clueIndex = 0;
        let currentTrack = 0;
        let keyHintRevealed = false;

        function saveMusicState() {
            const payload = {
                track: currentTrack,
                currentTime: Number.isFinite(bgm.currentTime) ? bgm.currentTime : 0,
                playing: !bgm.paused
            };
            localStorage.setItem(storageKey, JSON.stringify(payload));
        }

        function restoreMusicState() {
            try {
                const raw = localStorage.getItem(storageKey);
                if (!raw) return;
                const state = JSON.parse(raw);
                if (typeof state.track === 'number') currentTrack = state.track;
                loadTrack(currentTrack);
                const resume = () => {
                    if (typeof state.currentTime === 'number' && state.currentTime > 0) {
                        bgm.currentTime = Math.min(state.currentTime, bgm.duration || state.currentTime);
                    }
                    if (state.playing) {
                        bgm.play().catch(() => {});
                    }
                    syncMusicUI();
                    bgm.removeEventListener('loadedmetadata', resume);
                };
                bgm.addEventListener('loadedmetadata', resume);
            } catch {}
        }

        function loadTrack(index) {
            currentTrack = (index + playlist.length) % playlist.length;
            bgm.src = playlist[currentTrack].src;
            musicPlayer.dataset.track = playlist[currentTrack].title;
            bgm.load();
            saveMusicState();
        }

        function syncMusicUI() {
            musicPlayer.classList.toggle('is-playing', !bgm.paused);
            saveMusicState();
        }

        function setPuzzleNote(text, state = '') {
            puzzleNote.innerText = text;
            puzzleNote.className = 'puzzle-note';
            if (state) puzzleNote.classList.add(state);
        }

        function create(txt, isUser = false, isClue = false) {
            const d = document.createElement('div');
            d.className = 'dm-item' + (isUser ? ' user-danmaku' : '') + (isClue ? ' is-clue' : '');
            d.innerText = txt;
            d.style.top = (Math.random() * 88) + '%';

            const dur = isUser ? 18 + Math.random() * 8 : 26 + Math.random() * 18;
            const scale = isUser ? 0.94 + Math.random() * 0.18 : 0.68 + Math.random() * 0.55;
            const rotate = -9 + Math.random() * 18;
            const driftY = -14 + Math.random() * 28;
            const spacing = -0.03 + Math.random() * 0.12;

            d.style.animationDuration = dur + 's';
            d.style.opacity = (isClue ? 0.18 + Math.random() * 0.08 : isUser ? 0.34 + Math.random() * 0.18 : 0.06 + Math.random() * 0.11).toString();
            d.style.transform = `rotate(${rotate.toFixed(2)}deg) scale(${scale.toFixed(2)}) translateY(${driftY.toFixed(2)}px)`;
            d.style.letterSpacing = `${spacing.toFixed(2)}em`;

            box.appendChild(d);
            setTimeout(() => d.remove(), dur * 1000);
        }

        function send() {
            if (ipt.value.trim()) {
                create(ipt.value.trim(), true);
                ipt.value = '';
            }
        }

        function mockLogin(event) {
            event.preventDefault();
            const value = passwordInput.value.trim().toUpperCase();
            if (value === inviteCode) {
                setPuzzleNote('欢迎进来，门已经替你轻轻打开了。', 'is-success');
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 560);
                return;
            }
            setPuzzleNote('还差一点，再盯住那几条带 ✦ 标记的弹幕。', 'is-error');
        }

        function toggleAdminPanel() {
            adminPanel.classList.toggle('is-open');
            if (adminPanel.classList.contains('is-open')) {
                setTimeout(() => adminPasswordInput.focus(), 120);
            } else {
                adminPasswordInput.value = '';
            }
        }

        function adminLogin() {
            const value = adminPasswordInput.value.trim().toUpperCase();
            if (value === adminCode) {
                setPuzzleNote('欢迎回家，这里是你的港湾。', 'is-success');
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 560);
                return;
            }
            setPuzzleNote('管理员口令不对，只有你自己知道那串字。', 'is-error');
        }

        async function toggleMusic() {
            try {
                if (!bgm.src) loadTrack(currentTrack);
                if (bgm.paused) {
                    await bgm.play();
                } else {
                    bgm.pause();
                }
                syncMusicUI();
            } catch {}
        }

        async function playNextTrack() {
            loadTrack(currentTrack + 1);
            try {
                await bgm.play();
            } catch {}
            syncMusicUI();
        }

        function openLogin(event) {
            const rect = stage.getBoundingClientRect();
            const ripple = document.createElement('span');
            ripple.className = 'reveal-ripple';
            ripple.style.left = (event.clientX - rect.left) + 'px';
            ripple.style.top = (event.clientY - rect.top) + 'px';
            stage.appendChild(ripple);
            requestAnimationFrame(() => ripple.classList.add('is-run'));

            entryCard.classList.add('is-hidden');
            setTimeout(() => stage.classList.add('is-open'), 220);
            setTimeout(() => ripple.remove(), 1500);
        }

        function closeLogin() {
            stage.classList.remove('is-open');
            setTimeout(() => entryCard.classList.remove('is-hidden'), 240);
            setPuzzleNote('这不是门禁，只是一场藏在弹幕缝隙里的小解谜。');
            adminPanel.classList.remove('is-open');
            adminPasswordInput.value = '';
        }

        entryCard.addEventListener('click', openLogin);
        backBtn.addEventListener('click', closeLogin);
        hintBtn.addEventListener('click', () => {
            setPuzzleNote('提示：它不是单词，更像你随手留下的一串字母。');
        });
        fillInviteBtn.addEventListener('click', () => {
            if (!keyHintRevealed) {
                keyHintRevealed = true;
                fillInviteBtn.classList.add('is-revealed');
                setPuzzleNote('你摸到了那把小钥匙，再点一次它会替你开口。');
                return;
            }
            passwordInput.value = inviteCode;
            setPuzzleNote('口令已经悄悄落进输入框里了。');
        });
        adminToggle.addEventListener('click', toggleAdminPanel);
        adminLoginBtn.addEventListener('click', adminLogin);
        adminPasswordInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') adminLogin();
        });
        musicToggle.addEventListener('click', toggleMusic);
        bgm.addEventListener('loadedmetadata', syncMusicUI);
        bgm.addEventListener('play', syncMusicUI);
        bgm.addEventListener('pause', syncMusicUI);
        bgm.addEventListener('timeupdate', saveMusicState);
        bgm.addEventListener('ended', playNextTrack);
        ipt.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') send();
        });

        const seeds = [
            '楼下的风吹了一夜，窗帘到天亮都没安静下来',
            '昨天写到一半的话，还停在这个页面里',
            '灯一直没关，像是在等谁回来坐一会儿',
            '深夜的房间有种旧电影暂停后的安静',
            '外面已经很晚了，巷口那盏灯还亮着',
            '耳机里那首歌播完的时候，天刚好有一点白',
            '有些心事说不出口，就让它从背景里慢慢飘过去',
            '今晚没发生什么，只是风比平时更凉一点',
            '我把名字写在新门牌上，心里却还是空了一小块',
            '这一页先留白，剩下的话以后再慢慢补'
        ];

        setInterval(() => create(seeds[Math.floor(Math.random() * seeds.length)]), 1500);
        setInterval(() => {
            create(clueSeeds[clueIndex % clueSeeds.length], false, true);
            clueIndex += 1;
        }, 20000);

        for (let i = 0; i < 10; i++) {
            create(seeds[i % seeds.length]);
        }
        create(clueSeeds[0], false, true);

        document.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.closest('.entry-card')) return;
            const r = document.createElement('div');
            r.className = 'rip';
            r.style.left = e.clientX + 'px';
            r.style.top = e.clientY + 'px';
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 550);
        });

        restoreMusicState();
        if (!bgm.src) loadTrack(0);
        syncMusicUI();
    </script>
</body>
</html>
