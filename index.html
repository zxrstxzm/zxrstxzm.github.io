<!DOCTYPE html>
<html lang="zh-CN" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zzuxbox UI Lab</title>
    <style>
        /* 核心样式：即便被翻译干扰也能最大程度保住布局 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f7f7f7; font-family: sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        
        /* 弹幕背景层 */
        #danmakuBox { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        .dm-item { position: absolute; white-space: nowrap; font-size: 12px; color: rgba(0,0,0,0.07); animation: drift linear forwards; }
        @keyframes drift { from { left: 110%; } to { left: -150%; } }

        /* 中间卡片：增加强力 z-index 确保它永远在最前 */
        .card { background: #fff; padding: 40px 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); text-align: center; z-index: 100; width: 340px; border: 1px solid rgba(0,0,0,0.03); }
        .logo { width: 100px; height: 100px; margin-bottom: 20px; object-fit: contain; }
        h1 { font-size: 1.4rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 8px; }
        .line { width: 30px; height: 1px; background: #000; margin: 15px auto; }
        p { font-size: 11px; color: #aaa; letter-spacing: 1px; line-height: 1.8; }

        /* 底部互动区：简约风 */
        .footer-ui { position: fixed; bottom: 40px; display: flex; gap: 8px; z-index: 200; align-items: center; opacity: 0.5; transition: 0.3s; }
        .footer-ui:focus-within { opacity: 1; }
        input { border: none; border-bottom: 1px solid #ccc; background: transparent; padding: 6px; font-size: 12px; outline: none; width: 140px; }
        button { background: #000; color: #fff; border: none; padding: 6px 12px; font-size: 10px; cursor: pointer; border-radius: 2px; }

        /* 点击涟漪 */
        .rip { position: fixed; border: 1px solid rgba(0,0,0,0.1); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); animation: out 0.5s ease-out forwards; z-index: 999; }
        @keyframes out { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 120px; height: 120px; opacity: 0; } }
    </style>
</head>
<body>

    <div id="danmakuBox"></div>

    <div class="card">
        <img src="https://cdn.pixelpunk.cc/f/4b2b31a898f14a36/mmexport1775619313684.gif" class="logo" alt="logo">
        <h1>ZZUXBOX</h1>
        <div class="line"></div>
        <p>LAB PHASE: 01<br>INTERACTION TEST</p>
    </div>

    <div class="footer-ui">
        <input type="text" id="ipt" placeholder="Say something..." autocomplete="off">
        <button onclick="send()">SEND</button>
    </div>

    <script>
        const box = document.getElementById('danmakuBox');
        const ipt = document.getElementById('ipt');

        function create(txt, isMe = false) {
            const d = document.createElement('div');
            d.className = 'dm-item';
            if(isMe) { d.style.color = 'rgba(0,0,0,0.5)'; d.style.fontWeight = 'bold'; }
            d.innerText = txt;
            d.style.top = (Math.random() * 80 + 5) + '%';
            const dur = isMe ? 6 : (Math.random() * 10 + 10);
            d.style.animationDuration = dur + 's';
            box.appendChild(d);
            setTimeout(() => d.remove(), dur * 1000);
        }

        function send() {
            if(ipt.value.trim()) { create(ipt.value.trim(), true); ipt.value = ''; }
        }

        // 初始弹幕
        const seeds = ['STAY CALM', 'MINIMALIST', 'UI LAB', 'ZXRSTXZM', 'AESTHETIC'];
        setInterval(() => create(seeds[Math.floor(Math.random()*seeds.length)]), 3500);

        // 点击特效
        document.addEventListener('touchstart', (e) => {
            if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
            const r = document.createElement('div');
            r.className = 'rip';
            r.style.left = e.touches[0].clientX + 'px';
            r.style.top = e.touches[0].clientY + 'px';
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 500);
        });
        
        ipt.addEventListener('keyup', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
