<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zzuxbox UI Lab</title>
    <style>
        /* 1. 基础重置 - 确保代码全英文 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            /* Ins风高级质感：非纯白的暖灰背景 */
            background-color: #f7f7f7;
            /* 现代简约字体栈 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased; /* 字体抗锯齿，更清晰 */
        }

        /* 2. 居中卡片样式 */
        .card {
            background: white;
            padding: 3rem 2rem;
            border-radius: 24px; /* 圆角更有亲和力 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); /* 柔和的阴影 */
            text-align: center;
            max-width: 90%;
            width: 380px;
        }

        /* 3. 猫猫图片样式 - 彻底彩色 */
        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 25px;
            object-fit: contain;
            /* 这里删除了 grayscale 滤镜，确保彩色 */
        }

        /* 4. 文字排版 - 高级字间距 */
        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.15rem; /* 字间距拉开显高级 */
            margin-bottom: 10px;
            text-transform: uppercase; /* 强制大写 */
        }

        .divider {
            height: 1px;
            width: 40px;
            background-color: #e0e0e0;
            margin: 15px auto 25px;
        }

        p {
            font-size: 0.85rem;
            color: #666;
            letter-spacing: 0.05rem;
            line-height: 1.8;
            margin-bottom: 35px;
        }

        /* 5. 简约细线按钮样式 */
        .btn {
            display: inline-block;
            padding: 12px 30px;
            border: 1px solid #1a1a1a;
            background: none;
            color: #1a1a1a;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1rem;
            border-radius: 4px; /* 按钮微圆角 */
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #1a1a1a;
            color: white;
        }

        /* 6. 底部标注 */
        .footer {
            margin-top: 50px;
            font-size: 0.7rem;
            color: #ccc;
            letter-spacing: 0.1rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://cdn.pixelpunk.cc/f/4b2b31a898f14a36/mmexport1775619313684.gif" alt="Zzuxbox Logo" class="logo">
        
        <h1>ZZUXBOX</h1>
        <div class="divider"></div>
        <p>A MINIMALIST SPACE FOR <br> UI / UX EXPLORATION</p>
        
        <a href="#" class="btn">COMING SOON</a>

        <div class="footer">
            © 2026 ZXRSTXZM LAB.
        </div>
    </div>

</body>
</html>
