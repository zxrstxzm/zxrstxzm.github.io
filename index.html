<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zzuxbox UI Lab</title>
    <style>
        /* 1. 基础环境 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #f7f7f7; font-family: sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }

        /* 2. 弹幕容器 */
        #danmakuBox { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

        /* 3. 楷体大字横幅样式 - 核心更新 */
        .dm-item {
            position: absolute;
            white-space: nowrap;
            /* 强制楷体 */
            font-family: "STKaiti", "楷体", "KaiTi", serif;
            font-size: 8rem; /* 字号巨大 */
            font-weight: 900;
            color: #000; /* 黑色字体 */
            background-color: #fff; /* 纯白背景 */
            border: 8px solid #000; /* 粗黑边框 */
            padding: 10px 50px; /* 增加横幅厚度 */
            box-shadow: 15px 15px 0px rgba(0,0,0,0.1); /* 加个阴影更有质感 */
            letter-spacing: 1rem;
            animation: move-left linear forwards;
            line-height: 1;
        }

        @keyframes move-left {
            from { left: 100%; }
            to { left: -500%; } /* 字太大，飘远点防止截断 */
        }

        /* 4. 中间卡片样式 */
        .card { background: rgba(255, 255, 255, 0.98); padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: center; z-index: 100; width: 340px; }
        .logo { width: 100px; height: 100px; margin-bottom: 20px; object-fit: contain; }
        h1 { font-size: 1.4rem; letter-spacing: 4px; text-transform: uppercase; }
        .line { width: 30px; height: 1px; background: #000; margin: 15px auto; }
        p { font-size: 11px; color: #aaa; }

        /* 5. 底部互动 */
        .footer-ui { position: fixed; bottom: 40px; display: flex; gap: 8px; z-index: 200; }
        input { border: none; border-bottom: 2px solid #000; background: transparent; padding: 6px; font-size: 14px; outline: none; width: 160px; font-weight: bold; }
        button { background: #000; color: #fff; border: none; padding: 8px 16px; font-size: 12px; cursor: pointer; font-weight: bold; }

        /* 点击特效 */
        .rip { position: fixed; border: 2px solid #000; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); animation: out 0.5s ease-out forwards; z-index: 999; }
        @keyframes out { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 150px; height: 150px; opacity: 0; } }
    </style>
</head>
<body>

    <div id="danmakuBox"></div>

    <div class="card">
        <img src="https://cdn.pixelpunk.cc/f/4b2b31a898f14a36/mmexport1775619313684.gif" class="logo" alt="logo">
        <h1>ZZUXBOX</h1>
        <div class="line"></div>
        <p>LAB PHASE: 03<br>GIANT KAITI BANNERS</p>
    </div>

    <div class="footer-ui">
        <input type="text" id="ipt" placeholder="输入大字报内容..." maxlength="20">
        <button onclick="send()">发送</button>
    </div>

    <script>
        const box = document.getElementById('danmakuBox');
        const ipt = document.getElementById('ipt');

        function create(txt) {
            const d = document.createElement('div');
            d.className = 'dm-item';
            d.innerText = txt;
            // 随机高度：0-80% 之间
            d.style.top = (Math.random() * 80) + '%';
            // 随机速度：大字慢一点才霸气
            const dur = 8 + Math.random() * 8;
            d.style.animationDuration = dur + 's';
            box.appendChild(d);
            setTimeout(() => d.remove(), dur * 1000);
        }

        function send() {
            if(ipt.value.trim()) { create(ipt.value.trim()); ipt.value = ''; }
        }

        // 默认循环弹幕
        const seeds = ['极简主义', 'UI实验', '你好世界', '代码艺术', '楷体大字'];
        setInterval(() => create(seeds[Math.floor(Math.random()*seeds.length)]), 4000);

        // 回车发送
        ipt.addEventListener('keyup', (e) => { if(e.key === 'Enter') send(); });

        // 点击特效
        document.addEventListener('mousedown', (e) => {
            if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
            const r = document.createElement('div');
            r.className = 'rip';
            r.style.left = e.clientX + 'px'; r.style.top = e.clientY + 'px';
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 500);
        });
    </script>
</body>
</html>
