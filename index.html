<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zzuxbox UI Lab - 筹备中</title>
    <style>
        /* 1. 基础重置，确保全屏 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* 2. 唯美全屏渐变背景 */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }

        /* 3. 居中卡片样式 */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            backdrop-filter: blur(10px); /* 毛玻璃效果 */
            border: 1px solid rgba(255,255,255,0.3);
            max-width: 90%;
            width: 400px;
        }

        /* 4. 标题和文字样式 */
        .icon { font-size: 4rem; margin-bottom: 1rem; }
        h1 { font-size: 1.8rem; font-weight: 700; color: #4a148c; margin-bottom: 0.5rem; }
        p { font-size: 1rem; color: #666; line-height: 1.6; }

        /* 5. 底部标签样式 */
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 1rem;
        }
        .highlight { color: #764ba2; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🎨</div>
        <h1>Zzuxbox UI Lab</h1>
        <p>这里正在进行视觉升级</p>
        <p>精美作品正在打包中，敬请期待...</p>
        
        <div class="footer">
            Owner: <span class="highlight">zxrstxzm</span>
        </div>
    </div>
</body>
</html>
