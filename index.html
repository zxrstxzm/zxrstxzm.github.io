<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zzuxbox UI Lab</title>
    <style>
        /* 1. 全局样式设置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            /* Ins风经典的极简浅灰背景 */
            background-color: #f7f7f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }

        /* 2. 居中容器 */
        .container {
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        /* 3. 图标样式：使用你提供的 PixelPunk 链接 */
        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: 30px;
            filter: grayscale(1); /* 强制黑白处理，更高级 */
            transition: all 0.5s ease;
            opacity: 0.9;
        }
        
        .logo:hover {
            filter: grayscale(0); /* 鼠标经过或点击时恢复彩色 */
            transform: scale(1.05);
            opacity: 1;
        }

        /* 4. 文字排版 */
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.15rem; /* 字间距拉开更有设计感 */
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .divider {
            height: 1px;
            width: 40px;
            background-color: #333;
            margin: 20px auto;
        }

        p {
            font-size: 0.85rem;
            color: #666;
            letter-spacing: 0.05rem;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        /* 5. 简约按钮/链接样式 */
        .btn {
            display: inline-block;
            padding: 12px 30px;
            border: 1px solid #1a1a1a;
            background: none;
            color: #1a1a1a;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1rem;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #1a1a1a;
            color: #fff;
        }

        /* 6. 底部标注 */
        .footer {
            margin-top: 60px;
            font-size: 0.7rem;
            color: #ccc;
            letter-spacing: 0.1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://v1.pixelpunk.cc/s/4n6KjWu" alt="Logo" class="logo">
        
        <h1>ZZUXBOX</h1>
        <div class="divider"></div>
        <p>A MINIMALIST SPACE FOR <br> UI / UX EXPLORATION</p>
        
        <a href="#" class="btn">UNDER CONSTRUCTION</a>

        <div class="footer">
            © 2026 ZXRSTXZM LAB.
        </div>
    </div>

</body>
</html>
